{{- if semverCompare ">=8.1-0" (.Values.image.tag | default .Chart.AppVersion) -}}
apiVersion: v1
kind: Service
metadata:
  name: iddm-ui-service
  labels:
    app.kubernetes.io/component: iddm-ui
    {{- include "common.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: iddm-ui-service-port
      protocol: TCP
      port: 80
      targetPort: 3000
  selector:
    app.kubernetes.io/component: iddm-ui
    {{- include "common.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iddm-ui
  labels:
    app.kubernetes.io/component: iddm-ui
    {{- include "common.labels" . | nindent 4 }}
spec:
  strategy:
    type: RollingUpdate
    # rollingUpdate:
      # maxSurge: 1
      # maxUnavailable: 1
  revisionHistoryLimit: {{ (.Values.frontEnd).revisionHistoryLimit | default 2 }}
  {{- if gt (.Values.replicaCount | int) 0}}
  replicas: {{ (.Values.global.hibernate | default false) | ternary 0 (.Values.frontEnd).replicas }}
  {{- else }}
  replicas: 0
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: iddm-ui
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      name: iddm-ui
      {{- $logAnnotations := include "logging.annotations" (dict "component" .Values.frontEnd "context" .) -}}
      {{- if or $logAnnotations .Values.frontEnd.podAnnotations }}
      annotations:
        {{- $logAnnotations | nindent 8 }}
        {{- with .Values.frontEnd.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        app.kubernetes.io/component: iddm-ui
        {{- include "common.selectorLabels" . | nindent 8 }}
        {{- include "iddm.podLabels" (dict "component" .Values.frontEnd "context" .) | nindent 8 }}
    spec:
      volumes:
        - name: app-volume
          emptyDir:
            sizeLimit: 5Gi
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.podSecurityContext "context" $) | nindent 8 }}
      {{- end }}
      initContainers:
        - name: check-api-gateway
          image: alpine:latest
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.securityContext "context" $) | nindent 12 }}
          {{- end }}
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          command: ['sh', '-c', 'until nc -w 2 -z $0 $1; do echo Waiting for API Gateway -- $0:$1;sleep 2; done; echo Connection to API Gateway ok -- $0:$1', 'api-gateway-service', '80']
      containers:
      - name: iddm-ui
        image: "{{ ((.Values.frontEnd).image).repository | default "radiantone/iddm-ui" }}:{{ ((.Values.frontEnd).image).tag | default .Chart.AppVersion }}"
        imagePullPolicy: Always
        {{- if .Values.securityContext.enabled }}
        securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.securityContext "context" $) | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml (.Values.frontEnd).resources | nindent 10 }}
        ports:
        - containerPort: 3000
        envFrom:
          - configMapRef:
              name: iddm-ui-configmap
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 50
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 50
          successThreshold: 1
        volumeMounts:
          - mountPath: /opt/radiantone
            name: app-volume
      restartPolicy: Always
      {{- if .Values.nodeSelector }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if .Values.tolerations }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if (.Values.frontEnd).affinity }}
      {{- with (.Values.frontEnd).affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
---
apiVersion: v1
data:
  REACT_APP_API_BASE_URL: {{ (.Values.frontEnd).apiGatewayUrl }}
{{- range $key, $value := (.Values.frontEnd).env }}
  {{ tpl $key $ }}: "{{ tpl (print $value) $ }}"
{{- end }}
kind: ConfigMap
metadata:
  name: iddm-ui-configmap
{{- end }}
