apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fid.fullname" . }}-test-fid-connection"
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
spec:
  ttlSecondsAfterFinished: 60
  containers:
    - name: fid
      image: busybox
      command: ['nc']
      args: ['-zv', '{{ include "fid.fullname" . }}-app', '2389']
  restartPolicy: Never
  {{- with .Values.nodeSelector }}
  nodeSelector:
  {{- toYaml . | nindent 4 }}
  {{- end }}
