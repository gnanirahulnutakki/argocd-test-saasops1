# templates/elastic-indexing/index-pattern-rbac.yaml

{{- if and .Values.logging.indexCreation.enabled .Values.logging.indexCreation.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fid.fullname" . }}-index-patterns
  labels:
    {{- include "common.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.logging.indexCreation.rbac.automountToken | default false }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fid.fullname" . }}-index-patterns
  labels:
    {{- include "common.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fid.fullname" . }}-index-patterns
  labels:
    {{- include "common.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fid.fullname" . }}-index-patterns
subjects:
- kind: ServiceAccount
  name: {{ include "fid.fullname" . }}-index-patterns
  namespace: {{ .Release.Namespace }}
{{- end }}
