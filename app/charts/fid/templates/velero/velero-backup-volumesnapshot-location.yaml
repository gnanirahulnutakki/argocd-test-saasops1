{{- if and .Values.backup.enabled .Values.backup.velero.createResources (.Capabilities.APIVersions.Has "velero.io/v1/VolumeSnapshotLocation") }}
apiVersion: velero.io/v1
kind: VolumeSnapshotLocation
metadata:
  name: {{ .Release.Name }}-fid-vsl
  namespace: {{ .Values.backup.velero.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: velero
spec:
  provider: aws
  config:
    region: {{ .Values.backup.velero.bucket.region | quote }}
{{- end }}
