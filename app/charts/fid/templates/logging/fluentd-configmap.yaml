{{- if and (hasKey .Values "logging") .Values.logging (hasKey .Values.logging "fluentd") .Values.logging.fluentd .Values.logging.fluentd.enabled }}

{{- /* Define clusterName up front, so it can be used in the comment and below */ -}}
{{- $clusterName := .Values.zk.clusterName | default "fid-cluster" }}
{{- $globalCtx := . -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/core-name: {{ include "fid.name" . }}
data:
  fluent.conf: |
    # =====================================================================
    # Fluentd Configuration
    # Generated by Helm from templates/fluentd-configmap.yaml
    #
    # This configuration sets up Fluentd to tail and parse logs defined
    # in values.yaml under `logging.fluentd.logs` and forward them to
    # the aggregators defined under `logging.fluentd.aggregators`.
    #
    # Aggregators are validated and processed by helper templates in
    # _fluentd-helpers.tpl.
    #
    # The clusterName is: {{ $clusterName }}
    # =====================================================================

    # Build aggregator dictionary from array in values
    {{- $aggList := .Values.logging.fluentd.aggregators | default list }}
    {{- $aggMap := dict }}
    {{- range $agg := $aggList }}
      {{- if kindIs "map" $agg }}
        {{- $name := toString $agg.name }}
        {{- $existing := index $aggMap $name | default (list) }}
        {{- $newList := append $existing $agg }}
        {{- $_ := set $aggMap $name $newList }}
      {{- end }}
    {{- end }}

    # Process logs
    {{- $logs := .Values.logging.fluentd.logs | default dict }}
    {{- range $logName, $val := $logs }}
      {{- if $val.enabled }}
        {{- include "fid.fluentd.source" (dict "val" $val "logName" $logName "posFileDirectory" $.Values.logging.fluentd.posFileDirectory "context" $globalCtx) | nindent 8 }}
        {{- include "fid.fluentd.filter" (dict "val" $val "logName" $logName "clusterName" $clusterName "context" $globalCtx) | nindent 8 }}
        {{- include "fid.fluentd.match" (dict "val" $val "logName" $logName "aggregatorsList" $aggMap "clusterName" $clusterName "context" $globalCtx) | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
