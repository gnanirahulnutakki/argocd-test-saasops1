{{- if semverCompare ">=8.1-0" (.Values.image.tag | default .Chart.AppVersion) -}}
apiVersion: v1
kind: Service
metadata:
  name: iddm-proxy-service
  labels:
    app.kubernetes.io/component: iddm-proxy
    {{- include "common.labels" . | nindent 4 }}
  {{- with ((.Values.proxy).service).annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app.kubernetes.io/component: iddm-proxy
    {{- include "common.selectorLabels" . | nindent 4 }}
  type: {{ (.Values.service).type | default "ClusterIP" }}
  ports:
    - port: {{ ((.Values.proxy).service).port | default 80 }}
      targetPort: 8080
      name: http
    - port: 443
      targetPort: 8443
      name: https
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iddm-proxy
  labels:
    app.kubernetes.io/component: iddm-proxy
    {{- include "common.labels" . | nindent 4 }}
spec:
  strategy:
    type: RollingUpdate
    # rollingUpdate:
      # maxSurge: 1
      # maxUnavailable: 1
  revisionHistoryLimit: {{ (.Values.proxy).revisionHistoryLimit | default 2 }}
  {{- if gt (.Values.replicaCount | int) 0}}
  replicas: {{ (.Values.global.hibernate | default false) | ternary 0 (.Values.proxy).replicas }}
  {{- else }}
  replicas: 0
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: iddm-proxy
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: iddm-proxy
        {{- include "common.selectorLabels" . | nindent 8 }}
        {{- include "iddm.podLabels" (dict "component" .Values.proxy "context" .) | nindent 8 }}
      annotations:
        checksum/environment: {{ include (print $.Template.BasePath "/iddm-proxy-configmap.yaml") . | sha256sum }}
        {{- include "logging.annotations" (dict "component" .Values.proxy "context" .) | nindent 8 }}
      {{- if .Values.proxy.podAnnotations }}
        {{- with .Values.proxy.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      volumes:
        - name: haproxy-config
          configMap:
            name: iddm-proxy-cm
            defaultMode: 420
        - name: certs-volume
          emptyDir:
            sizeLimit: 500Mi
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.podSecurityContext "context" $) | nindent 8 }}
      {{- end }}
      initContainers:
        - name: generate-certs
          image: alpine/openssl:latest
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.securityContext "context" $) | nindent 12 }}
          {{- end }}
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          command: ['sh', '-c', 'openssl req -newkey rsa:2048 -nodes -x509 -days 365 -keyout /certs/haproxy.key -out /certs/haproxy.crt -subj "/CN=$(hostname)" && cat /certs/haproxy.crt /certs/haproxy.key > /certs/haproxy.pem && chmod 755 /certs/haproxy.pem']
          volumeMounts:
          - mountPath: /certs
            name: certs-volume
        - name: check-api-gateway
          image: alpine:latest
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.securityContext "context" $) | nindent 12 }}
          {{- end }}
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          command: ['sh', '-c', 'until nc -w 2 -z $0 $1; do echo Waiting for API Gateway -- $0:$1;sleep 2; done; echo Connection to API Gateway ok -- $0:$1', 'api-gateway-service', '80']
        - name: check-fid
          image: alpine:latest
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.securityContext "context" $) | nindent 12 }}
          {{- end }}
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          command: ['sh', '-c', 'until nc -w 2 -z $0 $1; do echo Waiting for FID -- $0:$1;sleep 2; done; echo Connection to FID ok -- $0:$1', '{{ include "fid.fullname" . }}-app', '2636']            
      containers:
        - name: haproxy
          image: {{ ((.Values.proxy).image).repository | default "haproxytech/haproxy-alpine" }}:{{ ((.Values.proxy).image).tag | default "latest" }}
          imagePullPolicy: Always
          {{- if .Values.securityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.securityContext "context" $) | nindent 12 }}
          {{- end }}
          args:
            - '-f'
            - /usr/local/etc/haproxy/haproxy.cfg
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: stat
              containerPort: 1024
              protocol: TCP
          resources:
            {{- toYaml (.Values.proxy).resources | nindent 12 }}
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
            - mountPath: /certs
              name: certs-volume
          livenessProbe:
            failureThreshold: 10
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 10
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          resources: {}
      imagePullSecrets:
        - name: regcred
      restartPolicy: Always
      {{- if .Values.nodeSelector }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if .Values.tolerations }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if (.Values.proxy).affinity }}
      {{- with (.Values.proxy).affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
{{- end }}
