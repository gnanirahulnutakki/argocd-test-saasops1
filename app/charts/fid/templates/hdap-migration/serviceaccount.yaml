{{/*
=============================================================================
HDAP Migration ServiceAccount
-----------------------------------------------------------------------------
Dedicated SA for the three HDAP migration Jobs. Ships with the chart — NOT
gated behind any customer-facing enable flag. The render gate below is the
only condition: if the target image tag is a v9 release, the migration
infrastructure renders. Otherwise nothing in this directory is emitted.

Lifecycle note (sentinel cleanup):
  The HDAP migration Jobs create a runtime ConfigMap
  (<fullname>-hdap-migration-state) with ownerReferences pointing back to
  this SA. When the SA is deleted — either by `helm uninstall`, by ArgoCD
  Application cascade delete, or by EOC teardown (which triggers the same) —
  the K8s garbage collector cascades the deletion to the sentinel. This
  replaces the fragile post-delete hook pattern that wedged on SA-pruning
  order in ArgoCD.

Hook delete policy:
  before-hook-creation  — recreates the SA on each upgrade (fresh UID)
  (NO hook-succeeded)   — SA persists AFTER the PreSync hooks complete so
                          the sentinel it owns remains valid throughout the
                          installed lifetime of the release.
=============================================================================
*/}}
{{- $targetTag := (.Values.image.tag | default .Chart.AppVersion) -}}
{{- $targetMajor := (index (splitList "." (index (splitList "-" $targetTag) 0)) 0) -}}
{{- if eq $targetMajor "9" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fid.fullname" . }}-hdap-migration-sa
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: hdap-migration
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/sync-wave": "-5"
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
{{- end }}
