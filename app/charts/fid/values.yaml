# Curator Configuration
# -------------------
# This section manages Elasticsearch index lifecycle.
# Key Features:
# - Index management settings
# - Retention policies
# - Connection configuration
# - Security settings
# - Job scheduling
# - Resource allocation
# Note: Important for log management and storage optimization.

# Curator Configuration
# -------------------
# This section manages the Elasticsearch Curator, which handles index lifecycle management.
# The curator uses the elasticsearch connection details from the default aggregator,
# while allowing other settings to be customized as needed.

# Curator Configuration
curator:
  enabled: false
  dryrun: false  # Set to true for testing
  # Client Configuration
  # Used in fid.curator.getClientConfig helper
  client:
    hosts: ["elasticsearch-master"]
    port: 9200
    timeout: 300
    master_only: false
    # SSL settings if needed
    use_ssl: false
    ssl_no_validate: true
    certificate: ""
    client_cert: ""
    client_key: ""
    # Auth settings if needed
    username: ""
    password: ""

  # Logging Configuration
  # Used directly in curator-configmap.yaml
  logging:
    loglevel: INFO
    logformat: default
    blacklist: ['elasticsearch', 'urllib3']

  # CronJob Settings
  # Used in curator-cronjob.yaml
  cronjob:
    schedule: "0 1 * * *"  # Runs at 1 AM daily
    concurrencyPolicy: "Forbid"
    failedJobsHistoryLimit: 5
    successfulJobsHistoryLimit: 5
    jobRestartPolicy: Never
    startingDeadlineSeconds: 600

  # Resource Management
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 400m
      memory: 512Mi

  # Security Settings
  rbac:
    enabled: true

  serviceAccount:
    create: true
    annotations: {}
    name: ""  # If not set, will use the full name template

  # Pod Settings
  pod:
    annotations: {}

  psp:
    create: false

  # # Node Placement
  # nodeSelector: {}
  # affinity: {}
  # tolerations: []

  # Priority
  priorityClassName: ""

# Gateway Configuration
# -------------------
# This section configures Istio gateway settings.
# Key Features:
# - Protocol-specific port configuration
# - Host routing rules
# - TLS settings
# - Service exposure
# - Traffic management
# - Security settings
# Note: Required for Istio service mesh integration.

istio:
  enabled: false
  gateway:
    selector:
      istio: ingress
    hosts: []
    #  - chart-example.local
    http:
      iddm:
        name: "http-iddm"
        port: 80
        serviceName: "iddm-proxy-service"
        servicePort: 80
    https:
      iddm:
        name: "https-iddm"
        port: 443
        serviceName: "iddm-proxy-service"
        servicePort: 443
    ldap:
      name: "ldap"
      port: 389
    ldaps:
      name: "ldaps"
      port: 636
# Migration and Lifecycle Management
# ================================
# Comprehensive configuration for managing application lifecycle events.
# Handles upgrades, backups, and data migrations.
#
# Key Components:
# 1. Automated Migration Jobs
# 2. Lifecycle Event Hooks
# 3. Backup Integration
# 4. Version Management
#
# Critical Operations:
# - Data preservation during upgrades
# - Configuration migration

# Migration Job Configuration
# -------------------------
# Automated jobs for data migration and backup
# Integrates with S3 for data storage
#
# Usage Scenarios:
# - Regular backups
# - Pre-upgrade snapshots
# - Data migration between versions
# - Configuration backups


cronjob:
  migration:
    enabled: false
    schedule: "0 0 * * *"
    s3: "s3://fid-exports/cronjob"

# Lifecycle Hooks Configuration
# ---------------------------
# Defines actions at various deployment lifecycle stages
# Critical for maintaining application state and data integrity
#
# Hook Types:
# 1. Installation Hooks
#    - Pre-install: Environment preparation
#    - Post-install: Initial configuration
#
# 2. Upgrade Hooks
#    - Pre-upgrade: Data backup, state preparation
#    - Post-upgrade: Migration, verification
#
# 3. Rollback Hooks
#    - Pre-rollback: State preservation
#    - Post-rollback: State restoration
#
# 4. Deletion Hooks
#    - Pre-delete: Data backup
#    - Post-delete: Cleanup operationss.

hooks:
  # Service Account for hooks
  hooks_sa:
    enabled: false

  # Installation phase
  pre_install:
    enabled: false
  post_install:
    enabled: false

  # Upgrade phase
  pre_upgrade:
    enabled: false
    s3: "s3://fid-exports/pre_upgrade"
  post_upgrade:
    enabled: false

  # Rollback phase
  pre_rollback:
    enabled: false
  post_rollback:
    enabled: false

  # Deletion phase
  pre_delete:
    enabled: false
  post_delete:
    enabled: false

# HDAP Migration Configuration
# ----------------------------
# Pre-upgrade export of HDAP data for Java 8 → Java 21 (FID 8.4.x → 9.0.0) upgrades.
#
# FID 9.0.0 introduces Java 21 + Lucene 10 (index format 9-10), which is binary-incompatible
# with Java 8 + Lucene 8 (index format 6) used by all 8.x releases. A direct in-place upgrade
# destroys HDAP data. This pre-upgrade hook exports HDAP using the OLD Java 8 JVM (Lucene 8
# codecs), then the FID v9 upgrade-installer handles the import with Java 21 (Lucene 10).
#
# Two-job design (required by ReadWriteOnce PVC constraint):
#   Job 1 (hook-weight 1): Version gate (8.4.x → 9.0.0 only); scales FID StatefulSet to 0.
#   Job 2 (hook-weight 2): Mounts freed PVC; runs built-in migrate.sh to export HDAP.
#
# Pre-conditions (all must be true before enabling):
#   1. hooks.hooks_sa.enabled: true        — creates fid-hook-account SA + Role
#   2. persistence.enabled: true           — PVC r1-pvc-<fullname>-0 must exist
#   3. hdapMigration.image.tag set         — any FID 8.4.x tag (minimum: "8.4.0")
#   4. FID >= 8.4.0 currently installed    — rli.migration.hdap.all flag introduced in 8.4.0
#
# Usage:
#   enabled: turns on support for the HDAP migration workflow in this chart.
#   run: arm switch for the migration. Both must be true for hooks to render.
#
# Defaults to true for BOTH flags. The render gate at the top of the hook
# template still requires target image major version == 9, so these defaults
# are inert for same-major upgrades and for non-v9 installs. On subsequent
# syncs after a successful migration, Job 1's sentinel short-circuit makes
# the hooks a near-instant no-op (phase=completed → exit 0).
#
# Setting either to false when target is v9 triggers the pre-upgrade guard
# Job (hook-weight 0, runs before Job 1), which fails the sync loudly with
# a clear error message rather than silently skipping migration. This
# prevents the silent-data-corruption class of bug where a v9 image is
# applied on top of FID 8.x Lucene-8 indexes without first exporting HDAP
# data.
hdapMigration:
  enabled: true
  run: true
  # Image used by HDAP migration hook Jobs that need kubectl (Job 1 scale-down,
  # Job 2 orchestrator, Job 3 PVC cleanup, post-delete sentinel cleanup).
  # Debian-based Bitnami build includes full coreutils (date, sort, head, wc,
  # awk, grep, sleep, bash, jq) — use instead of distroless kubectl images
  # (e.g. rancher/kubectl, registry.k8s.io/kubectl) which lack /bin/sh.
  #
  # Pinned to a concrete versioned tag rather than "latest" so upgrades behave
  # deterministically. Bump deliberately when validated; do not depend on
  # moving tags for hook execution.
  #
  # Namespace note: Broadcom moved Bitnami's versioned tags from "bitnami/"
  # to "bitnamilegacy/" in 2025. bitnami/kubectl only publishes "latest" now;
  # bitnamilegacy/kubectl retains the semver-pinned builds we need here.
  scaleDownImage:
    repository: bitnamilegacy/kubectl
    tag: "1.31.0"
  image:
    # FALLBACK ONLY. The orchestrator auto-discovers the worker image from
    # the live StatefulSet at runtime — that's the image the tenant was
    # actually running, guaranteed to exist and to be Java-8 compatible.
    # These values are used only if the STS read fails at runtime (rare).
    repository: radiantone/fid
    tag: "8.4.0"
  # Seconds to wait for all FID pods to terminate before Job 2 starts.
  # Increase if FID takes longer to drain connections in your environment.
  scaleDownTimeout: 300
  # Seconds to wait for fid-0 (leader) to become Ready after patching the
  # StatefulSet with the v9 image. Covers: container pull, v9 installer,
  # HDAP migration import, ZK leader election, startup probe.
  leaderBootTimeout: 900
  # Seconds to wait for full StatefulSet rollout after scaling from 1 to N.
  # Each follower starts sequentially (OrderedReady), provisions a fresh PVC,
  # and replicates HDAP data from the leader.
  rolloutTimeout: 1800
  job:
    # Controls hook-delete-policy annotations.
    # When true (default):
    #   Helm:   before-hook-creation (required — Jobs are immutable, must delete to recreate)
    #   ArgoCD: HookFailed (completed hooks persist and are skipped on next sync;
    #           failed hooks are deleted and retried on next sync)
    # When false: no delete policy annotations — hooks persist unconditionally.
    delete: true

# Dependencies Configuration
# -----------------------
# This section manages chart dependencies and their settings.
# Key Features:
# - ZooKeeper deployment
# - Dependency enablement
# - Version control
# - Configuration inheritance
# - Resource management
# - Integration settings
# Note: Critical for proper service dependencies.
# Dependencies are disabled by default.

dependencies:
  zookeeper:
    enabled: true

# Values file Inputs for the dependency charts.
zookeeper:
  fullnameOverride: zookeeper
  image:
    tag: "3.5.8-secure"
  metrics:
    imageTag: secure
  alternateName: fid
  replicaCount: 3
  persistence:
    enabled: false
    storageClass: ""
  logging:
    annotations:
      enabled: false
      config: {}
      # config:
      #   retention-policy: 7d

# Environment Variable Management
# =============================
# Comprehensive environment variable configuration system.
# Supports multiple sources and security levels.
#
# Variable Sources:
# 1. Direct Values
#    - Immediate configuration
#    - Non-sensitive settings
#
# 2. Secrets
#    - Sensitive information
#    - Credentials
#    - Keys and tokens
#
# 3. ConfigMaps
#    - Configuration data
#    - Non-sensitive settings
#    - Shared configurations
#
# 4. Generated Secrets
#    - Automatically created secrets
#    - Dynamic configurations

env:
  # REQUIRED for v9 (Java 25) HDAP migration import on startup.
  # Java 25's default subprocess launcher (posix_spawn) fails silently in
  # containerized environments, which causes the v9 startup to skip the
  # HDAP migration import. With FORK, the migration subprocess runs, the
  # exported ZIP at /opt/radiantone/vds/hdap-migration/java-21-export.zip
  # is imported into fresh Lucene 10 indexes, and FID boots cleanly.
  # Without this, v9 hits IndexFormatTooOldException on old Lucene 8 indexes.
  JAVA_TOOL_OPTIONS: "-Djdk.lang.Process.launchMechanism=FORK"

## "valueFrom" environment variable references that will be added to deployment pods. Name is templated.
## ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.19/#envvarsource-v1-core
## Renders in container spec as:
##   env:
##     ...
##     - name: <key>
##       valueFrom:
##         <value rendered as YAML>

envValueFrom: {}
  #  ENV_NAME:
  #    configMapKeyRef:
  #      name: configmap-name
  #      key: value_key

## The name of a secret in the same kubernetes namespace which contain values to be added to the environment
## This can be useful for auth tokens, etc. Value is templated.
envFromSecret: ""

## Sensible environment variables that will be rendered as new secret object
## This can be useful for auth tokens, etc
envRenderSecret: {}

## The names of secrets in the same kubernetes namespace which contain values to be added to the environment
## Each entry should contain a name key, and can optionally specify whether the secret must be defined with an optional key.
## Name is templated.
envFromSecrets: []
## - name: secret-name
##   optional: true

## The names of conifgmaps in the same kubernetes namespace which contain values to be added to the environment
## Each entry should contain a name key, and can optionally specify whether the configmap must be defined with an optional key.
## Name is templated.
## ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.23/#configmapenvsource-v1-core
envFromConfigMaps: []
## - name: configmap-name
##   optional: true

# Extra Init Containers
# ---------------------
# Allows adding custom init containers to the pod.
# In `statefulset.yaml`, these are added to the `initContainers` section.
#
# Affect on Deployment:
# Can perform setup tasks before the main container starts.
# Ensure they complete successfully to avoid startup issues.
# Additional init containers (evaluated as template)
# ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/

extraInitContainers: []

# Extra Container Volumes
# -----------------------
# Volumes that can be used in init containers but not mounted to the main container.
# In `statefulset.yaml`, these volumes are added to the `volumes` section.
#
# Affect on Deployment:
# Useful for temporary data needed during initialization.
extraContainerVolumes: []
#  - name: volume-from-secret
#    secret:
#      secretName: secret-to-mount
#  - name: empty-dir-volume
#    emptyDir: {}

# Volume Management Configuration
# =============================
# Additional volume configurations for supporting storage needs.
# Provides flexibility for various storage requirements.
#
# Volume Types:
# 1. Extra Volumes
#    - Additional storage volumes
#    - Configuration volumes
#    - Shared storage
#
# 2. Volume Mounts
#    - Mount points for volumes
#    - Access path configuration
#    - Read/write modes
#
# 3. Container Volumes
#    - Init container storage
#    - Temporary processing space
#    - Shared state storage

## @param extraVolumes Optionally specify extra list of additional volumes for the FID pod(s)
## Example Use Case: mount certificates to enable TLS
## e.g:
## extraVolumes:
## - name: fid-keystore
##   secret:
##     defaultMode: 288
##     secretName: fid-keystore
## - name: zookeeper-truststore
##   secret:
##     defaultMode: 288
##     secretName: fid-truststore
##
extraVolumes: []
## @param extraVolumeMounts Optionally specify extra list of additional volumeMounts for the ZooKeeper container(s)
## Example Use Case: mount certificates to enable TLS
## e.g:
## extraVolumeMounts:
## - name: fid-keystore
##   mountPath: /certs/keystore
##   readOnly: true
## - name: fid-truststore
##   mountPath: /certs/truststore
##   readOnly: true
##
extraVolumeMounts: []
## @param sidecars Add additional sidecar containers to the FID pod(s)
## e.g:
## sidecars:
##   - name: your-image-name
##     image: your-image
##     imagePullPolicy: Always
##     ports:
##       - name: portname
##         containerPort: 1234
##

# Sidecar Containers
# ------------------
# Adds additional containers to the pod.
# In `statefulset.yaml`, these are appended to the `containers` list.
#
# Affect on Deployment:
# Sidecars can provide auxiliary functions like logging or monitoring.
# Be mindful of resource usage and potential conflicts.
sidecars: []
## @param postInstall Add additional commands to run after install, these commnds will run after first install
## Example:
## postInstall:
##     enabled: true
##     leaderOnly: true
##     script: |
##       # Custom script
##       /opt/radiantone/vds/bin/vdsconfig.sh set-property -name agentsApiServerEndpoint -value "https://example.com/example"
##

# Lifecycle Hook Scripts
# ----------------------
# Specifies custom scripts to run at different lifecycle stages.
# In `statefulset.yaml`, these scripts are integrated into the container's startup command.
#
# Fields:
# - `preInstall`, `preStart`, `postInstall`, `postStart`: Scripts for respective lifecycle events.
# - `enabled`: Enables the script.
# - `leaderOnly`: If true, runs the script only on the leader pod.
#
# Affect on Deployment:
# Allows customization of the deployment process.
# Errors in scripts can prevent the application from starting.

postInstall:
  enabled: false
  leaderOnly: true
  script: |
    # Post install custom script

## @param postStart Add additional commands to run after startup, these commnds will run after start up
## Example:
## postStart:
##     enabled: true
##     leaderOnly: true
##     script: |
##       # Custom script
##       /opt/radiantone/vds/bin/runDerbyServer.sh
##
postStart:
  enabled: false
  leaderOnly: true
  script: |
    # Post start custom script

## @param preInstall Add additional commands to run after install, these commnds will run after first install
## Example:
## preInstall:
##     enabled: true
##     leaderOnly: true
##     script: |
##       # Custom script
##
preInstall:
  enabled: false
  leaderOnly: true
  script: |
    # Pre install custom script

## @param preStart Add additional commands to run after startup, these commnds will run after start up
## Example:
## preStart:
##     enabled: true
##     leaderOnly: true
##     script: |
##       # Custom script
##       /opt/radiantone/vds/bin/runDerbyServer.sh
##
preStart:
  enabled: false
  leaderOnly: true
  script: |
    # Pre start custom script

