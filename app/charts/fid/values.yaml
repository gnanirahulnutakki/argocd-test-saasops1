# Logging & Metrics Configuration
# ==============================
# This section manages comprehensive logging and monitoring capabilities for the FID deployment.
# It integrates both Fluentd for log aggregation and Prometheus metrics collection.
#
# Key Components:
# 1. Log Collection: Captures logs from various FID components
# 2. Metrics Export: Prometheus metrics for monitoring
# 3. Aggregator Integration: Supports multiple log destinations
# 4. Index Management: Automatic log rotation and cleanup
# 5. Retention Policies: Configurable retention periods
#
# Integration Points:
# - Elasticsearch/OpenSearch for log storage
# - Prometheus for metrics collection
# - Grafana for visualization
# - Curator for index lifecycle management
#
# Security Considerations:
# - Authentication for log aggregators
# - SSL/TLS encryption for log transport
# - Access control for metrics
# - Sensitive data filtering

# Metrics Exporter Configuration
exporter:
  image: "radiantone/fid-exporter"
  # imageTag: "dev-1.0.4"
  imageTag: secure
  securityContext:
    enabled: true
    runAsUser: 0
  annotations: {}
  # Probe Configurations
  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 120
    timeoutSeconds: 5

metrics:
  enabled: false
  image: "radiantone/script_exporter"
  tag: "v2.24.3"
  pushMode: false
  pushGateway: http://prometheus-pushgateway.common-services.svc.cluster.local:9091
  pushMetricCron: "* * * * *"
  # binddn:
  # bindpassword:

# Logging Configuration
# ===================
# Comprehensive logging setup using Fluentd and optional Fluent Bit.
# Supports multiple log sources and destinations with flexible routing.
#
# Major Features:
# - Multiple log source support
# - Various output aggregators
# - Configurable retention policies
# - Log parsing and transformation
# - Buffer management
# - SSL/TLS support
#
# The logging section supports detailed configuration of:
# 1. Log sources (VDS server, connectors, events, etc.)
# 2. Output destinations (Elasticsearch, Splunk, etc.)
# 3. Retention policies per log type
# 4. Custom parsing rules
# 5. Buffer settings
# 6. Security configurations

logging:
  enabled: false
  annotations:
    enabled: false
    config: {}
    # config:
    #   retention-policy: 7d

  # fluent-bit:
  #   enabled: false
  # Automatically creates index patterns in Kibana when enabled
  indexCreation:
    enabled: false
    rbac:
      enabled: false
    kibana:
      scheme: "http"
      host: "kibana.mycompany.local"
      port: "5601"
      # user: "custom-user"
      # password: "custom-pass"
  fluentd:
    enabled: false
    posFileDirectory: "/opt/radiantone/vds/work/logging"
    configFile: /fluentd/etc/fluent.conf
    # Log Sources Configuration
    logs:
      # Connector Logs (with dynamic path handling)
      connector:
        enabled: true
        path: "/opt/radiantone/vds/logs/sync_agents/*/connector.log"
        index: connector.log
        # custom_index: "sync_agents.${tag_parts[1]}.connector"
        aggregators: ["default"]
        retention_days: 30
      # VDS Server Logs
      vds_server:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/vds_server.log"
        index: vds_server.log
        retention_days: 30
        aggregators: ["default"]  # Default aggregator
        # shards: 1  #  Set shards to be allocated for each index, Optional, defaults to 1
        # replicas: 1  #  Optional, no of replicas each index can have, defaults to 1
        # refresh_interval: "5s"  #  Default is 5s, can be modified, Optional, defaults to 5s
        # custom_index: custom_vds_server       # Optional: Custom index name
        # splunk_index: vds_splunk              # Optional: Splunk-specific index
        # splunk_source: vds_source             # Optional: Splunk source
        # splunk_sourcetype: vds_sourcetype     # Optional: Splunk sourcetype
      # VDS Server Access Logs
      vds_server_access:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/vds_server_access.csv"
        index: vds_server_access.log
        retention_days: 30
        aggregators: ["default"]
        parse: |-
          <parse>
            @type tsv
            keys LOGID,LOGDATE,LOGTIME,LOGTYPE,SERVERID,SERVERPORT,SESSIONID,MSGID,CLIENTIP,BINDDN,BINDUSER,CONNNB,OPNB,OPCODE,OPNAME,BASEDN,ATTRIBUTES,SCOPE,FILTER,SIZELIMIT,TIMELIMIT,LDAPCONTROLS,CHANGES,RESULTCODE,ERRORMESSAGE,MATCHEDDN,NBENTRIES,ETIME
            types LOGID:integer,LOGDATE:string,LOGTIME:string,LOGTYPE:integer,SERVERID:string,SERVERPORT:integer,SESSIONID:integer,MSGID:integer,CLIENTIP:string,BINDDN:string,BINDUSER:string,CONNNB:integer,OPNB:integer,OPCODE:integer,OPNAME:string,BASEDN:string,ATTRIBUTES:string,SCOPE:string,FILTER:string,SIZELIMIT:integer,TIMELIMIT:integer,LDAPCONTROLS:string,CHANGES:string,RESULTCODE:integer,ERRORMESSAGE:string,MATCHEDDN:string,NBENTRIES:integer,ETIME:integer
          </parse>
      vds_events:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/vds_events.log"
        index: vds_events.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source:
        # splunk_sourcetype:
      periodiccache:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/periodiccache.log"
        index: periodiccache.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source
        # splunk_sourcetype
      web:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/jetty/web.log"
        index: web.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source
        # splunk_sourcetype
      web_access:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/jetty/web_access.log"
        index: web_access.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source
        # splunk_sourcetype
      sync_engine:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/sync_engine/sync_engine.log"
        index: sync_engine.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source
        # splunk_sourcetype
      alerts:
        enabled: true
        path: "/opt/radiantone/vds/logs/alerts.log"
        index: alerts.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source
        # splunk_sourcetype
      adap_access:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/adap_access.log"
        index: adap_access.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source
        # splunk_sourcetype
      admin_rest_api_access:
        enabled: true
        path: "/opt/radiantone/vds/vds_server/logs/admin_rest_api_access.log"
        index: admin_rest_api_access.log
        retention_days: 30
        aggregators: ["default"]
        # custom_index:
        # splunk_index:
        # splunk_source
        # splunk_sourcetype
    # Aggregator Configurations
    # IMPORTANT: Elasticsearch/OpenSearch support BOTH flat and nested SSL parameters
    # for compatibility with EOC and other management systems
    aggregators:

      #  Default Elasticsearch aggregator
      - name: "default"  #  required unique aggregator name
        type: "elasticsearch"  #  required aggregator type
        host: "elasticsearch-master.common-services.svc.cluster.local"  #  required
        port: "9200"  #  required

        # scheme: "https"  #  optional
        # user: "elastic"  #  optional
        # password: "changeme"  #  optional
        # path: ""  #  optional
        # logstash_format: true  #  optional
        # logstash_prefix: "myapp"  #  optional
        # reconnect_on_error: true  #  optional
        # time_key: "@timestamp"  #  optional
        # include_timestamp: false  #  optional

        # buffer:  #  optional (nested configuration works)
        #   chunk_limit_size: "2M"  #  optional
        #   flush_interval: "5s"  #  optional
        #   retry_type: "exponential_backoff"  #  optional
        #   path: "/var/log/fluentd-buffers/es.buffer"  #  optional

        # SSL/TLS configuration - BOTH formats supported:
        # Option 1: Nested SSL (EOC compatible)
        # ssl:  #  optional
        #   enabled: true  #  optional
        #   verify: false  #  optional
        #   ca_path: "/path/to/ca.pem"  #  optional
        #   cert_path: "/path/to/client-cert.pem"  #  optional
        #   key_path: "/path/to/client-key.pem"  #  optional
        #   key_passphrase: "secret"  #  optional

        # Option 2: Flat SSL parameters (also supported)
        # ssl_verify: false  #  optional
        # ca_file: "/path/to/ca.pem"  #  optional
        # client_cert: "/path/to/client-cert.pem"  #  optional
        # client_key: "/path/to/client-key.pem"  #  optional
        # client_key_pass: "secret"  #  optional

