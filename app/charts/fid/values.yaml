# Fluent Bit Configuration
# -----------------------
# This section manages container log collection and forwarding.
# Key Features:
# - Log collection from multiple service containers
# - Configurable refresh intervals for log scanning
# - Integration with Elasticsearch/OpenSearch
# - Prometheus metrics exposure
# - Custom parsing and filtering options
# Note: Ensure proper log retention and storage capacity planning.

fluent-bit:
  enabled: false

  # Hot Reload Configuration
  # When enabled, fluent-bit will automatically reload configuration
  # when the ConfigMap changes without pod restarts
  hotReload:
    enabled: true
    image:
      repository: ghcr.io/jimmidyson/configmap-reload
      tag: v0.11.1
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 32Mi

  # Pod annotations for fluent-bit pods
  podAnnotations: {}

  # Node selector for Fluent Bit DaemonSet
  nodeSelector: {}

  # Resource limits for Fluent Bit pods
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi

  # Core Fluent Bit settings
  fullnameOverride: "fluent-bit"
  flush: 1  # Interval to flush output (seconds)
  logLevel: info  # Options: debug, info, warn, error
  metricsPort: 2020

  # Service configuration
  service:
    type: ClusterIP

  # Prometheus monitoring
  prometheusRule:
    enabled: false
  serviceMonitor:
    enabled: false

  # ConfigMap override (if you want to use a custom ConfigMap)
  existingConfigMap: fluent-bit-config

  # Log sources configuration
  logs:
    - name: fid
      enable: true
      path: /var/log/containers/fid-*.log
      refresh_interval: 10
      aggregators: ["default"]  # Specify which aggregators to send logs to
    - name: zookeeper
      enable: false
      path: /var/log/containers/zookeeper-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: api-gateway
      enable: true
      path: /var/log/containers/api-gateway-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: authentication
      enable: true
      path: /var/log/containers/authentication-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: data-catalog
      enable: true
      path: /var/log/containers/data-catalog-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: directory-browser
      enable: true
      path: /var/log/containers/directory-browser-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: directory-namespace
      enable: true
      path: /var/log/containers/directory-namespace-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: directory-schema
      enable: true
      path: /var/log/containers/directory-schema-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: settings
      enable: true
      path: /var/log/containers/settings-*.log
      refresh_interval: 10
      aggregators: ["default"]
    - name: system-administration
      enable: true
      path: /var/log/containers/system-administration-*.log
      refresh_interval: 10
      aggregators: ["default"]

  # ========================================
  # AGGREGATOR CONFIGURATION
  # ========================================
  # Two configuration formats are supported:
  # 1. LEGACY FORMAT (Single Aggregator) - Deprecated but still functional
  # 2. NEW FORMAT (Multi-Aggregator) - Recommended for new deployments
  #
  # IMPORTANT NOTES:
  # - If only the legacy format is configured, it will work as before
  # - If both formats are present, the NEW format takes precedence
  # - The legacy format is maintained for backward compatibility

  # ----------------------------------------
  # LEGACY FORMAT: Single Aggregator Configuration (DEPRECATED)
  # ----------------------------------------
  # ⚠️ THIS FORMAT IS DEPRECATED - Please migrate to the new format below
  # 📖 Migration Guide: See docs/fluent-bit/README.md#migration-guide
  #
  # This format still works for backward compatibility.
  # It only supports a single aggregator destination.

  outputSearchHost: "elasticsearch-master"  #  Options: "elasticsearch-master", "elasticsearch-master-internal", "opensearch-master"
  outputSearchType: "es"  #  Options: "es", "opensearch"
  # outputSearchPort: 9200
  # outputSearchIndex: "fluent-bit"
  # outputSearchUsername: ""
  # outputSearchPassword: ""
  # outputSearchLogstashFormat: true
  # outputSearchLogstashPrefix: "fid-logs"
  # outputSearchDocType: "_doc"
  # outputSearchLogstashDateFormat: "%Y.%m.%d"

  # ----------------------------------------
  # NEW FORMAT: Multi-Aggregator Configuration (RECOMMENDED)
  # ----------------------------------------
  # ✅ Use this format for new deployments
  # ✅ Supports multiple simultaneous aggregators
  # ✅ More configuration options per aggregator
  # ✅ Each log source can specify which aggregators to use
  #
  # To use the new format, uncomment 'aggregators:' and configure the destinations you need.
  # When 'aggregators:' is defined, it takes precedence over the legacy format above.

  # aggregators:
  #   # Default Elasticsearch aggregator
  #   - name: "default"  # Required: unique aggregator name
  #     type: "elasticsearch"  # Required: aggregator type
  #     host: "elasticsearch-master"  # Required
  #     port: 9200  # Required
  #     username: ""  # Optional
  #     password: ""  # Optional
  #     tls: false  # Optional
  #     tlsVerify: false  # Optional
  #     index: "fluent-bit"  # Optional
  #     type: "_doc"  # Optional
  #     logstashFormat: true  # Optional
  #     logstashPrefix: "fid-logs"  # Optional
  #     logstashDateFormat: "%Y.%m.%d"  # Optional
  #     bufferSize: "4KB"  # Optional
  #     retryLimit: false  # Optional
  #     replaceDots: true  # Optional
  #     suppressTypeName: true  # Optional
  #
  #   # OpenSearch aggregator
  #   - name: "opensearch-prod"  # Required: unique aggregator name
  #     type: "opensearch"  # Required: aggregator type
  #     host: "my-domain.us-west-2.es.amazonaws.com"  # Required
  #     port: 443  # Required
  #     awsAuth: true  # Optional
  #     awsRegion: "us-west-2"  # Optional
  #     awsRole: "arn:aws:iam::123456789:role/fluent-bit"  # Optional
  #     tls: true  # Optional
  #     tlsVerify: true  # Optional
  #     index: "fid-logs"  # Optional
  #     type: "_doc"  # Optional
  #     logstashFormat: true  # Optional
  #     logstashPrefix: "fid"  # Optional
  #     suppressTypeName: true  # Optional
  #
  #   # Grafana Loki aggregator
  #   - name: "loki-prod"  # Required: unique aggregator name
  #     type: "loki"  # Required: aggregator type
  #     host: "loki.monitoring.svc"  # Required
  #     port: 3100  # Required
  #     # For Grafana Cloud:
  #     username: ""  # Optional: Your Grafana Cloud instance ID
  #     password: ""  # Optional: Your Grafana Cloud API token
  #     tenantId: ""  # Optional: Usually same as username for Grafana Cloud
  #     labels: "job=fluent-bit,environment=production"  # Optional
  #     autoKubernetesLabels: "on"  # Optional
  #     lineFormat: "json"  # Optional
  #     removeKeys: "kubernetes.pod_id,stream"  # Optional
  #     tls: false  # Optional
  #     tlsVerify: false  # Optional
  #     retryLimit: false  # Optional
  #
  #   # Amazon S3 aggregator (for archival)
  #   - name: "s3-archive"  # Required: unique aggregator name
  #     type: "s3"  # Required: aggregator type
  #     bucket: "my-logs-bucket"  # Required
  #     region: "us-west-2"  # Required
  #     prefix: "fid-logs"  # Optional
  #     roleArn: "arn:aws:iam::123456789:role/fluent-bit"  # Optional
  #     totalFileSize: "50M"  # Optional
  #     uploadTimeout: "10m"  # Optional
  #     usePutObject: "On"  # Optional
  #     compression: "gzip"  # Optional
  #     contentType: "application/json"  # Optional
  #
  #   # Kafka aggregator
  #   - name: "kafka-stream"  # Required: unique aggregator name
  #     type: "kafka"  # Required: aggregator type
  #     brokers: "kafka-0:9092,kafka-1:9092"  # Required
  #     topics: "fid-logs"  # Optional
  #     messageKey: "kubernetes.pod_name"  # Optional
  #     timestampKey: "@timestamp"  # Optional
  #     timestampFormat: "iso8601"  # Optional
  #     retryLimit: false  # Optional
  #
  #   # Splunk aggregator
  #   - name: "splunk-hec"  # Required: unique aggregator name
  #     type: "splunk"  # Required: aggregator type
  #     host: "splunk-hec.example.com"  # Required
  #     port: 8088  # Required
  #     token: "your-hec-token"  # Required
  #     tls: true  # Optional
  #     tlsVerify: false  # Optional
  #     index: "kubernetes"  # Optional
  #     source: "fluent-bit"  # Optional
  #     sourcetype: "_json"  # Optional
  #
  #   # Sumo Logic aggregator
  #   - name: "sumologic-collector"  # Required: unique aggregator name
  #     type: "sumologic"  # Required: aggregator type
  #     collectorUrl: "https://endpoint.sumologic.com/receiver/v1/http/..."  # Required
  #     sourceName: "kubernetes"  # Optional
  #     sourceCategory: "fid/logs"  # Optional
  #     sourceCategoryPrefix: "prod"  # Optional
  #     enrichWithK8sMeta: true  # Optional
  #
  #   # Standard output aggregator (for debugging)
  #   - name: "stdout-debug"  # Required: unique aggregator name
  #     type: "stdout"  # Required: aggregator type
  #     format: "json_lines"  # Optional

metricsService:
  enabled: false
  image:
    repository: "ricoberger/script_exporter"
    tag: "v2.12.0"

# Enable the auto-config-promotion feature for IDDM configurations
autoConfigPromotion:
  enabled: false
  # Changing volumeMountPath can result in permissions issues in certain kubernetes deployments
  volumeMountPath: /opt/radiantone/git
  persistence:
    annotations: {}
    storageClass: ""
    size: 10Gi
#  # The configurations to use git as the provider for this feature. Currently only git is supported
#  git:
#    repository:
#    exportTo:
#      branch:
#    importFrom:
#      branch:
#    credentials:
#      # It is recommended to implement your own secure secret (ie, SealedSecret, Vault, etc) and provide the name of the secret here
#      # The secret should contain either GIT_PRIVATE_KEY or GIT_USERNAME/GIT_PASSWORD
#      secretName:
#
#      # If you want to provide a private key directly without a secure secret mechanism, it can be done so here. Either in plain text or as base64
#      privateKey:
#      privateKeyBase64:
#
#      # If you want to provide a username/password directly without a secure secret mechanism, it can be done so here
#      username:
#      password:

# Velero backup configuration
backup:
  enabled: false
  velero:
    createResources: true
    namespace: ""
    annotations: {}
    labels: {}
    schedule: 0 0 * * *
    skipImmediately: true
    backupSyncPeriod: 5m
    bucket:
      name: ""
      region: ""
      prefix: ""
    retention: 7
    storageLocation: {}
    config:
      storageLocation: ""
      volumeSnapshotLocations: []
      snapshotVolumes: true
      csiSnapshotTimeout: 1h
      filter:
        includedResources:
          - '*'
        excludedResources:
          - pods
          - replicasets
          - endpointslices
          - endpoints
        labelSelector:
          matchLabels:
            radiantlogic.io/app: fid

# -----------------------------------------------------------------------------
# -- Pre upgrade chart job
# -----------------------------------------------------------------------------
preUpgradeChart:
  enabled: true
  job:
    delete: true
    ttlSecondsAfterFinished: 300
  image:
    repository: "radiantone/kubectl"
    tag: "secure"
