# Global Configuration
# ===================
# This section defines settings that affect all components across the entire deployment.
# These settings cascade down to all containers and services unless explicitly overridden.
#
# Key Features:
# - Enterprise Operational Control (EOC) mode management
# - Global environment variable configuration
# - Platform-specific compatibility settings
# - OpenShift adaptation support
#
# Usage Impact:
# - EOC mode should be enabled only for saas
# - Environment variables are injected into all pods
# - Platform compatibility affects security context rendering

global:
  # Controls Environment Operational Centre, control mode across services
  # When true, enables enterprise-specific features and behaviors
  eoc: true

  # Global environment variables passed to all deployment pods
  # Example:
  #   AWS_REGION: us-east-1
  env: {}

  # Platform-specific adaptations, particularly for OpenShift
  # Modifies security contexts to work with restricted SCCs
  compatibility:
    openshift:
      # Values: auto, force, disabled (or empty)
      # auto: Automatically detect and adapt
      # force: Always apply OpenShift adaptations
      # disabled: No platform-specific changes
      adaptSecurityContext: auto

  # Hibernate the application
  # Scales down pods to zero if set to true
  # Default is false
  hibernate: false

  # Affect on Deployment:
  # Influences pod placement, which can affect performance and resource utilization.
  nodeSelector: {}

  # Tolerations allow the scheduler to schedule pods with matching taints.
  tolerations: []

  # Node affinity is conceptually similar to nodeSelector, allowing you to constrain which nodes your Pod can be scheduled on based on node labels.
  affinity: {}

# Alternate Name Configuration
# ============================
# Allows the specification of an alternate name for the application.
# This can be useful for branding or multi-tenancy purposes.
alternateName: ""

# Replica Count Configuration
# ==========================
# Controls the number of pod replicas in the FID StatefulSet.
# This setting directly impacts high availability and scaling.
#
# Important Considerations:
# - More replicas increase availability but consume more resources
# - Odd number recommended for better consensus in distributed operations
# - Each replica requires its own persistent storage
# - License may limit maximum replicas

replicaCount: 1

# Image Configuration
# ==================
# Defines the container image settings for the FID deployment.
# Critical for determining which version of the application runs.
#
# Configuration Impact:
# - Repository changes affect image pull behavior
# - Tag determines application version
# - PullPolicy affects update behavior and resource usage
#
# Security Note:
# - Use specific tags in production, avoid 'latest'
# - Consider using image pull secrets for private registries
# - Verify image authenticity in production environments

image:
  # Docker image repository location
  repository: radiantone/fid-nightly

  # Image pull policy
  # Always: Always pull image
  # IfNotPresent: Use cached image if available
  # Never: Only use local images
  pullPolicy: Always

  # Image tag (version)
  # Defaults to chart appVersion if empty
  # Recommendation: Always specify in production
  tag: ""

# FID Core Configuration
# =====================
# Core settings for the FID server deployment.
# These settings fundamentally define how the FID server operates.
#
# Critical Aspects:
# - Authentication credentials
# - Licensing
# - Cluster behavior
# - Migration handling
# - API access
# - Health monitoring
#
# Security Notes:
# - Protect root credentials
# - Secure API keys
# - Consider using external secrets management

fid:
  # Admin user name
  # Default: cn=Directory Manager
  # Used for initial login
  rootUser: "cn=Directory Manager"

  # Root user password
  # Consider using external secrets management
  rootPassword: "Welcome1234"

  # FID license key
  # Required for production use
  license:

  # Cluster detachment behavior
  # When true, node gracefully leaves cluster on shutdown
  # Note: Do not use in production
  detach: false

  # Read-only mode
  # When true, new IDDM node, joins cluster in read-only mode
  readonly: false

  # ========================================
  # MIGRATION CONFIGURATION
  # ========================================
  migration:
    # Migration file that will be imported during first install (export.zip)
    # url: https://raw.githubusercontent.com/radiantlogic-devops/docker-compose/master/05-monitoring-stack/configs/fid/export.zip
    url:
    # Post migration script to be run after install (configure_fid.sh)
    script:

    # Advanced migration configuration
    # Precedence rule:
    # - When advanced.enabled: true, ONLY the advanced block is used. Legacy fields (url/file/script) are ignored.
    # - When advanced.enabled: false or unset, ONLY legacy fields (url/file/script) are used.
    advanced:
      enabled: false
      # Source selector and provider-specific settings
      source:
        # One of: http | s3 | gcs | azure | git | db
        type: ""
        http:
          url: ""
          # extra curl flags, e.g. "-L"
          flags: ""
          # Optional future fields (not all wired initially):
          headers: []
        s3:
          bucket: ""
          key: ""
          region: ""
          endpoint: ""   # for S3-compatible stores (optional)
          auth:
            # If true, rely on ambient credentials (IRSA/instance role), ignore static keys
            irsa: true
            accessKeyIdSecretRef: {name: "", key: ""}
            secretAccessKeySecretRef: {name: "", key: ""}
            sessionTokenSecretRef: {name: "", key: ""}
        gcs:
          bucket: ""
          object: ""
          auth:
            # If true, rely on Workload Identity/Application Default Credentials
            workloadIdentity: true
            # If provided, mount this service account JSON and set GOOGLE_APPLICATION_CREDENTIALS
            serviceAccountKeySecretRef: {name: "", key: ""}
        azure:
          accountName: ""
          container: ""
          blob: ""
          auth:
            managedIdentity: true
            accountKeySecretRef: {name: "", key: ""}
            sasTokenSecretRef: {name: "", key: ""}
        git:
          repo: ""   # e.g., git@github.com:org/private.git or https://github.com/org/private.git
          ref: "main"
          path: "export.zip"
          auth:
            # For SSH auth (preferred):
            sshKeySecretRef: {name: "", key: "ssh-privatekey"}
            knownHostsConfigMapRef: {name: "", key: "known_hosts"}
            # HTTPS auth (optional):
            usernameSecretRef: {name: "", key: "username"}
            passwordSecretRef: {name: "", key: "password"}
            tokenSecretRef: {name: "", key: "token"}
        db:
          # Minimal DB support (optional): postgres or mysql
          driver: ""   # postgres | mysql
          host: ""
          port: 0
          database: ""
          userSecretRef: {name: "", key: ""}
          passwordSecretRef: {name: "", key: ""}
          query: ""              # returns the export.zip bytes; base64 is recommended
          outputEncoding: "raw"   # raw | base64
      # Optional: fetch a post-migration script over HTTP when advanced.enabled (HTTP only for now)
      script:
        url: ""
        flags: ""

      # Images used per provider (override if you need pinning)
      image:
        http: "alpine/curl:latest"
        s3: "amazon/aws-cli:2.15.40"
        gcs: "gcr.io/google.com/cloudsdktool/google-cloud-cli:slim"
        azure: "mcr.microsoft.com/azure-storage/azcopy:10.24.0"
        git: "bitnami/git:latest"
        db_postgres: "postgres:16-alpine"
        db_mysql: "mysql:8.3"
        pullPolicy: IfNotPresent

  # Secret mounting configuration
  # Requires FID 8.0.0+
  # True: Mount secrets as files
  # False: Use environment variables
  mountSecrets: true

  # Sealed Secrets integration
  sealedSecrets: false

  # Admin API key for programmatic access
  adminApiKey:

  ## Deploy a readonly/follower-only sts, that joins current FID cluster
  ##
  followerOnly:
    enabled: false
    # Enable this with caution
    autoscaling:
      enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    ## Detach from cluster on termination
    detach: true
  livenessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 5
  # see https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#configure-probes
  startupProbe:
    initialDelaySeconds: 0
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 15

# ZooKeeper Configuration
# =======================
# Configuration for ZooKeeper connectivity, essential for cluster coordination.
# ZooKeeper manages distributed synchronization for the FID cluster.
#
# Key Aspects:
# - Cluster coordination
# - Configuration management
# - Leader election
# - Distributed locking
#
# Operational Impact:
# - Critical for multi-node deployments
# - Affects cluster stability
# - Influences failover behavior

zk:
  # Use external ZooKeeper instead of embedded
  # Recommended for production environments
  external: true

  # ZooKeeper connection string
  # Format: host:port
  connectionString: "zookeeper-app:2181"

  # Unique cluster identifier
  # Used to isolate multiple FID clusters
  clusterName: "fid-cluster"

  # Health check endpoint
  # Used to verify ZooKeeper status
  ruok: "http://zookeeper-app:8080/commands/ruok"

  # Authentication credentials
  # Optional but recommended for security
  userName: "admin"
  password: "secret1234"

# Sysctl Configuration
# ===================
# Kernel parameter settings via sysctl.
# Modifies system settings for optimal performance.
#
# Security Note:
# - Requires privileged access
# - Use with caution in production
# - Validate changes with security team

sysctl:
  enabled: false

# Image Credentials Configuration
# ==============================
# Manages authentication for container registry access.
# Essential for pulling images from private registries.
#
# Security Considerations:
# - Protect registry credentials
# - Use minimal-privilege accounts
# - Regular credential rotation
# - Consider using external secrets

imagePullSecrets: []
# imagePullSecrets:
# - name: regcred

# Image Credentials
imageCredentials:
  enabled: false
  registry: docker.io
  username:
  password:
  email:

# Name Overrides
# =============
# Controls resource naming in Kubernetes.
# Affects how resources are identified and referenced.
#
# Usage:
# - nameOverride: Partial name replacement
# - fullnameOverride: Complete name replacement
# - Affects service discovery and references

nameOverride: ""
fullnameOverride: "fid"

# Service Account Configuration
# ===========================
# Kubernetes service account settings.
# Controls pod permissions and access to cluster resources.
#
# Security Impact:
# - Affects pod permissions
# - Controls API access
# - RBAC integration point

serviceAccount:
  # Create dedicated service account
  create: false

  # Additional annotations
  annotations: {}

  # Custom name override
  # Default: Generated using fullname template
  name: ""

# Update Strategy
# ==============
# Controls how pod updates are performed
updateStrategy: RollingUpdate

# Pod Annotations
# =============
# Custom metadata for pods
podAnnotations: {}

# Pod Labels
# =============
# Custom metadata for pods
podLabels: {}

# Security Contexts
# ===============
# Security settings for pods and containers.
# Critical for security posture and compliance.

# Pod Security Context
# --------------------
# Defines security settings for the entire pod.
# In `statefulset.yaml`, applied to `securityContext` in the pod spec if `enabled` is true.
#
# Fields:
# - `fsGroup`: Group ID for mounted volumes.
# - `privileged`: If true, the pod has elevated privileges.
#
# Affect on Deployment:
# Security contexts affect permissions and capabilities.
# Misconfiguration can lead to security risks or permission issues.
podSecurityContext:
  enabled: true
  fsGroup: 1000

# Container Security Context
# --------------------------
# Defines security settings for individual containers.
# In `statefulset.yaml`, applied to `securityContext` in the container spec if `enabled` is true.
#
# Affect on Deployment:
# Enhances security by restricting container permissions.
# Example: Running as non-root user.
securityContext:
  enabled: true
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service Configuration
# ---------------------
# Configures the Kubernetes Service for the FID application.
# In `statefulset.yaml`, service definitions use these settings.
#
# Affect on Deployment:
# Determines how the service is exposed within the cluster.

service:
  # Service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  # Port exposed by the service
  port: 7070
  # Annotations for fid-ext service
  annotations: {}
  # Annotations for fid-app service
  app:
    annotations: {}
  # Annotations for fid-admin service
  admin:
    annotations: {}

ingress:
  enabled: false
  annotations: {}
  # annotations:
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - "/"
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Resource Management
# ------------------
# This section defines container resource allocation and limits.
# Key Features:
# - `limits`: Maximum resource constraints for CPU and memory
# - `requests`: Guaranteed resource allocations
# - CPU units in cores or millicores (e.g., 1 = 1 core, 500m = 0.5 cores)
# - Memory units in bytes (e.g., 2Gi = 2 Gigabytes)
# Note: Properly tune these values based on workload requirements and cluster capacity.
# resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
# resources:
#  limits:
#    cpu: 4
#    memory: 8Gi
#  requests:
#    cpu: 2
#    memory: 2Gi

resources:
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# ##############################
# #### Do not enable this ######
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
# ###############################

# Node Scheduling Configuration
# -----------------------------
# Controls where pods are scheduled in the cluster.
# In `statefulset.yaml`, these settings are applied to the pod spec.
#
# Fields:
# - `nodeSelector`: Assign pods to nodes with matching labels.
# - `tolerations`: Allow pods to be scheduled on nodes with matching taints.
# - `affinity`: Advanced node selection rules.
#
# Affect on Deployment:
# Influences pod placement, which can affect performance and resource utilization.

nodeSelector: {}
  # tenantname:

# Tolerations allow the scheduler to schedule pods with matching taints.

tolerations: []

# Node affinity is conceptually similar to nodeSelector, allowing you to constrain which nodes your Pod can be scheduled on based on node labels.
affinity: {}
## Enable persistence using Persistent Volume Claims
## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
##

# Persistence Configuration
# ========================
# Manages persistent storage configuration for stateful data.
# Critical for maintaining data across pod restarts and migrations.
#
# Storage Considerations:
# 1. Performance: Storage class affects I/O performance
# 2. Availability: Access modes determine pod scheduling
# 3. Capacity: Size must accommodate data growth
# 4. Backup: Annotations can trigger backup solutions
#
# Operational Impact:
# - Storage class affects provisioning speed
# - Access modes influence high availability options
# - Size changes require manual intervention
# - Annotations can integrate with backup systems

persistence:
  enabled: false
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, azure-disk on
  ##   Azure, standard on GKE, AWS & OpenStack)
  ##
  # storageClass: "-"
  storageClass: "default"
  accessModes:
  - ReadWriteOnce
  size: 10Gi
  annotations: {}

